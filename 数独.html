<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>数独 · 音效版</title>
  <style>
    :root {
      --bg: #eef2f5;
      --board-bg: #ffffff;
      --cell-border: #cbd5e1;
      --cell-border-thick: #475569;
      --cell-bg: #ffffff;
      --cell-preset-bg: #f1f5f9;
      --cell-highlight-rowcol: #e0f2fe;
      --cell-highlight-box: #f0f4f8;
      --cell-selected: #bae6fd;
      --cell-same-number: #dcfce7;
      --cell-error-bg: #fee2e2;
      --cell-error-text: #b91c1c;
      --preset-color: #0f172a;
      --player-color: #1e40af;
      --note-color: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --btn-bg: #ffffff;
      --btn-border: #cbd5e1;
      --btn-hover: #f8fafc;
      --btn-active: #dbeafe;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.06);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 0.15s ease;
      --font-cell: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      --font-note: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
      background: linear-gradient(145deg, #e9eef3 0%, #dce3ea 30%, #edf1f5 60%, #e2e8f0 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 520px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
    }
    .header .title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.02em;
    }
    .header .title .icon { font-size: 1.7rem; }
    .stats {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #334155;
      background: #fff;
      padding: 6px 12px;
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    .stat-icon { font-size: 1rem; }
    .stat-value {
      font-weight: 700;
      color: #0f172a;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
      min-width: 32px;
      text-align: center;
    }
    .mistakes-warn .stat-value { color: #dc2626; }
    .difficulty-selector {
      display: flex;
      gap: 4px;
      background: #fff;
      border-radius: 30px;
      padding: 4px;
      box-shadow: var(--shadow-sm);
      width: 100%;
      max-width: 360px;
    }
    .diff-btn {
      flex: 1;
      padding: 8px 10px;
      border: none;
      background: transparent;
      border-radius: 26px;
      cursor: pointer;
      font-size: 1.0rem;
      font-weight: 600;
      color: #475569;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: 0.02em;
    }
    .diff-btn:hover { background: #f1f5f9; color: #0f172a; }
    .diff-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 10px rgba(37,99,235,0.3);
    }
    .board-wrapper {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 12px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .board-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      height: 100%;
      border: 2.5px solid var(--cell-border-thick);
      border-radius: 4px;
      overflow: hidden;
      background: var(--cell-border-thick);
      gap: 1px;
    }
    .cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--cell-bg);
      font-size: clamp(20px, 4.5vw, 30px);
      font-weight: 600;
      font-family: var(--font-cell);
      color: var(--player-color);
      position: relative;
      transition: background-color 0.08s ease, transform 0.1s;
      min-width: 0;
      min-height: 0;
    }
    .cell:hover { background: #f8fafc; }
    .cell:active { background: #e2e8f0; transform: scale(0.96); }
    .cell.preset {
      background: var(--cell-preset-bg);
      color: var(--preset-color);
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02);
    }
    .cell.box-right { border-right: 2px solid var(--cell-border-thick); }
    .cell.box-bottom { border-bottom: 2px solid var(--cell-border-thick); }
    .cell.highlight-related { background: #e0f2fe; }
    .cell.highlight-box { background: #f1f5f9; }
    .cell.selected-cell {
      background: #7dd3fc !important;
      box-shadow: inset 0 0 0 3px #2563eb;
      z-index: 2;
      position: relative;
    }
    .cell.same-number-highlight {
      background: #bbf7d0 !important;
      box-shadow: inset 0 0 1.5px #4ade80;
    }
    .cell.same-number-highlight.selected-cell {
      background: #86efac !important;
      box-shadow: inset 0 0 0 3px #2563eb;
    }
    .cell.preset.selected-cell {
      background: #b9d9f5 !important;
    }
    .cell.error {
      color: var(--cell-error-text) !important;
      background: #fecaca !important;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }
    .cell .notes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
      padding: 2px;
      pointer-events: none;
    }
    .cell .notes-grid span {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(7px, 1.4vw, 9px);
      font-weight: 500;
      color: var(--note-color);
      font-family: var(--font-note);
    }
    .cell.has-value .notes-grid { display: none; }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
      width: 100%;
      max-width: 480px;
    }
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    /* 数字按钮：加大 + 长椭圆 */
    .num-btn {
      width: clamp(48px, 10vw, 75px);
      height: clamp(36px, 7vw, 44px);
      border-radius: 12px;
      border: 1.5px solid var(--btn-border);
      background: var(--btn-bg);
      cursor: pointer;
      font-size: clamp(19px, 3.5vw, 22px);
      font-weight: 700;
      color: #0f172a;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      font-family: inherit;
      position: relative;
      flex: 0 0 auto;
      padding: 0;
    }
    .num-btn:hover { background: #f1f5f9; border-color: #94a3b8; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .num-btn:active { background: #e2e8f0; transform: scale(0.93); }
    .num-btn.count-indicator::after {
      content: attr(data-count);
      position: absolute;
      top: -6px;
      right: -6px;
      font-size: 9px;
      font-weight: 700;
      background: #e2e8f0;
      color: #334155;
      border-radius: 12px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      pointer-events: none;
    }
    .num-btn.count-indicator.full::after {
      background: #fed7aa;
      color: #c2410c;
    }

    /* 擦除按钮：和数字同大、同椭圆 */
    .action-btn.erase-btn {
      width: clamp(48px, 10vw, 75px);
      height: clamp(36px, 7vw, 44px);
      border-radius: 12px;
      padding: 0;
      flex: 0 0 auto;
      font-size: 0;
    }
    .action-btn.erase-btn::after {
      content: "🧹";
      font-size: 1rem;
    }

    /* 第三行按钮：保持原样 */
    .action-btn {
      flex: 1;
      max-width: 110px;
      padding: 10px 6px;
      border-radius: 24px;
      border: 1.5px solid var(--btn-border);
      background: var(--btn-bg);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: #334155;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
      font-family: inherit;
    }
    .action-btn:hover { background: #f8fafc; border-color: #94a3b8; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .action-btn:active { background: #e2e8f0; transform: scale(0.95); }
    .active-toggle { background: #fff7ed; border-color: #f97316; color: #c2410c; }
    .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    .action-btn.primary:hover { background: var(--accent-hover); }
    .action-btn.hint-btn { background: #fef9c3; border-color: #facc15; color: #854d0e; }
    .action-btn.undo-btn { background: #fce7f3; border-color: #f9a8d4; color: #9d174d; }

    .overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: #fff; border-radius: var(--radius-lg);
      padding: 28px 24px 22px; text-align: center;
      box-shadow: var(--shadow-lg); max-width: 360px; width: 90%;
      animation: popIn 0.3s cubic-bezier(0.22,0.61,0.36,1);
    }
    @keyframes popIn { from { opacity:0; transform:scale(0.85) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal .trophy { font-size: 3.2rem; animation: bounce 0.6s ease; }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-18px);} 50%{transform:translateY(0);} 70%{transform:translateY(-8px);} 85%{transform:translateY(0);} }
    .modal h2 { font-size: 1.6rem; margin: 8px 0 4px; color: #0f172a; }
    .result-details { display: flex; gap: 20px; justify-content: center; margin: 16px 0 20px; }
    .result-item .val { font-size: 1.5rem; font-weight: 700; color: #0f172a; }
    .result-item .lbl { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
    .modal button {
      padding: 12px 28px; border-radius: 30px; border: none;
      background: var(--accent); color: #fff; font-size: 1rem;
      font-weight: 700; cursor: pointer; box-shadow: 0 6px 16px rgba(37,99,235,0.3);
      transition: all 0.15s; font-family: inherit;
    }
    .modal button:hover { background: var(--accent-hover); transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title"><span class="icon">🧩</span>数独</div>
    <div class="stats">
      <div class="stat-item"><span class="stat-icon">⏱️</span><span class="stat-value" id="timer">00:00</span></div>
      <div class="stat-item mistakes-warn"><span class="stat-icon">⚠️</span><span class="stat-value" id="mistakes">0</span><span style="font-size:1.0rem;">/3</span></div>
    </div>
  </div>
  <div class="difficulty-selector" id="difficultySelector">
    <button class="diff-btn" data-diff="easy">🌟 简单</button>
    <button class="diff-btn active" data-diff="medium">⭐ 中等</button>
    <button class="diff-btn" data-diff="hard">🔥 困难</button>
  </div>
  <div class="board-wrapper">
    <div class="board-inner"><div class="board" id="board"></div></div>
  </div>
  <div class="controls">
    <div class="btn-row">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
    </div>
    <div class="btn-row">
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
      <button class="action-btn erase-btn" id="btnErase">擦除</button>
    </div>
    <div class="btn-row">
      <button class="action-btn undo-btn" id="btnUndo">↩️ 撤销</button>
      <button class="action-btn" id="btnNotes">✏️ 笔记</button>
      <button class="action-btn hint-btn" id="btnHint">💡 提示</button>
      <button class="action-btn primary" id="btnNewGame">🔄 新游戏</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none;">
  <div class="modal">
    <div class="trophy" id="modalIcon">🏆</div>
    <h2 id="modalTitle">恭喜完成！</h2>
    <div class="result-details">
      <div class="result-item"><div class="val" id="resultTime">00:00</div><div class="lbl">用时</div></div>
      <div class="result-item"><div class="val" id="resultMistakes">0</div><div class="lbl">错误</div></div>
      <div class="result-item"><div class="val" id="resultDiff">中等</div><div class="lbl">难度</div></div>
    </div>
    <button id="btnPlayAgain">🎮 再来一局</button>
  </div>
</div>

<script>
  (function() {
    const boardEl = document.getElementById('board');
    const timerEl = document.getElementById('timer');
    const mistakesEl = document.getElementById('mistakes');
    const overlayEl = document.getElementById('overlay');
    const resultTimeEl = document.getElementById('resultTime');
    const resultMistakesEl = document.getElementById('resultMistakes');
    const resultDiffEl = document.getElementById('resultDiff');
    const btnErase = document.getElementById('btnErase');
    const btnUndo = document.getElementById('btnUndo');
    const btnNotes = document.getElementById('btnNotes');
    const btnHint = document.getElementById('btnHint');
    const btnNewGame = document.getElementById('btnNewGame');
    const btnPlayAgain = document.getElementById('btnPlayAgain');
    const difficultySelector = document.getElementById('difficultySelector');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    function playTone(freq, type, duration, gain=0.15, rampDown=true) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(gain, t);
      if (rampDown) g.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + duration);
    }
    function sfxClick() { playTone(800, 'sine', 0.08, 0.12); }
    function sfxPlace() { playTone(660, 'sine', 0.12, 0.15); }
    function sfxError() { playTone(180, 'triangle', 0.25, 0.18); }
    function sfxErase() { playTone(400, 'sine', 0.07, 0.08); }
    function sfxNoteToggle() { playTone(520, 'sine', 0.06, 0.08); }
    function sfxHint() { playTone(1000, 'sine', 0.15, 0.15); setTimeout(()=>playTone(1200,'sine',0.1,0.1), 100); }
    function sfxUndo() { playTone(350, 'triangle', 0.1, 0.1); }
    function sfxWin() { [523,659,784,1047].forEach((f,i)=> setTimeout(()=>playTone(f,'sine',0.25,0.2), i*120)); }
    function sfxGameOver() { playTone(220,'sawtooth',0.3,0.15); setTimeout(()=>playTone(180,'sawtooth',0.3,0.15),150); }
    const GRID = 9, BOX = 3;
    let solution = [], board = [], initial = [], notes = [];
    let selectedRow = -1, selectedCol = -1;
    let difficulty = 'medium';
    let timerSec = 0, timerInterval = null;
    let mistakes = 0, maxMistakes = 3;
    let noteMode = false, gameComplete = false;
    let history = [];
    let gameStarted = false;
    const diffConfig = { easy: { remove: 36, label: '简单' }, medium: { remove: 46, label: '中等' }, hard: { remove: 53, label: '困难' } };
    const deepCopy = (arr) => arr.map(r => [...r]);
    const cloneNotes = (src) => src.map(r => r.map(c => c ? new Set(c) : null));
    const cloneNoteCell = (c) => (c && c.size) ? new Set(c) : null;
    function shuffle(arr) { for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
    function isValid(grid, r, c, num) {
      for (let i=0; i<GRID; i++) if (grid[r][i]===num || grid[i][c]===num) return false;
      const br=Math.floor(r/BOX)*BOX, bc=Math.floor(c/BOX)*BOX;
      for (let i=br; i<br+BOX; i++) for (let j=bc; j<bc+BOX; j++) if (grid[i][j]===num) return false;
      return true;
    }
    function candidates(grid, r, c) { const res=[]; for(let n=1; n<=9; n++) if(isValid(grid,r,c,n)) res.push(n); return res; }
    function findBest(grid) {
      let best={r:-1,c:-1,cnt:10};
      for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(grid[r][c]===0){
        const cand=candidates(grid,r,c);
        if(cand.length<best.cnt){best={r,c,cnt:cand.length};if(best.cnt===0||best.cnt===1)return best;}
      }
      return best;
    }
    function countSols(grid, limit=2) {
      const cell=findBest(grid);
      if(cell.r===-1)return 1;
      if(cell.cnt===0)return 0;
      const cands=candidates(grid,cell.r,cell.c);
      let total=0;
      for(const num of cands){
        grid[cell.r][cell.c]=num;
        total+=countSols(grid,limit-total);
        grid[cell.r][cell.c]=0;
        if(total>=limit)return total;
      }
      return total;
    }
    function generateSolution() {
      const grid=Array.from({length:GRID},()=>Array(GRID).fill(0));
      function fill(g){const cell=findBest(g);if(cell.r===-1)return true;const cands=candidates(g,cell.r,cell.c);shuffle(cands);for(const n of cands){g[cell.r][cell.c]=n;if(fill(g))return true;g[cell.r][cell.c]=0;}return false;}
      if(!fill(grid))return generateSolution();
      return grid;
    }
    function generatePuzzle(sol, removeTarget) {
      const puz=deepCopy(sol);
      const cells=[];
      for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)cells.push({r,c});
      shuffle(cells);
      let removed=0;
      for(const {r,c} of cells){
        if(removed>=removeTarget)break;
        const backup=puz[r][c];
        puz[r][c]=0;
        if(countSols(deepCopy(puz),2)===1)removed++;
        else puz[r][c]=backup;
      }
      return puz;
    }
    function initGame() {
      stopTimer(); timerSec=0; updateTimer();
      mistakes=0; updateMistakes();
      gameComplete=false; gameStarted=false;
      history=[]; noteMode=false; updateNoteBtn();
      selectedRow=-1; selectedCol=-1;
      const full=generateSolution();
      solution=full;
      board=generatePuzzle(full,diffConfig[difficulty].remove);
      initial=Array.from({length:GRID},(_,r)=>Array.from({length:GRID},(_,c)=>board[r][c]!==0));
      notes=Array.from({length:GRID},()=>Array(GRID).fill(null));
      renderBoard();
      updateNumCounts();
      overlayEl.style.display='none';
    }
    function startIfNeeded() { if(!gameStarted&&!gameComplete){gameStarted=true;startTimer();} }
    function startTimer() { stopTimer(); timerInterval=setInterval(()=>{timerSec++;updateTimer();},1000); }
    function stopTimer() { if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }
    function updateTimer() { const m=Math.floor(timerSec/60),s=timerSec%60; timerEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
    function updateMistakes() { mistakesEl.textContent=mistakes; }
    function renderBoard() {
      boardEl.innerHTML='';
      for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
        const cell=document.createElement('div');
        cell.className='cell';
        cell.dataset.row=r; cell.dataset.col=c;
        if(c===2||c===5)cell.classList.add('box-right');
        if(r===2||r===5)cell.classList.add('box-bottom');
        if(initial[r][c])cell.classList.add('preset');
        else if(board[r][c]!==0){cell.classList.add('player-input','has-value');if(board[r][c]!==solution[r][c])cell.classList.add('error');}
        if(board[r][c]!==0){cell.textContent=board[r][c];cell.classList.add('has-value');}
        else if(notes[r][c]&&notes[r][c].size){
          const grid=document.createElement('div');grid.className='notes-grid';
          for(let n=1;n<=9;n++){const sp=document.createElement('span');sp.textContent=notes[r][c].has(n)?n:'';grid.appendChild(sp);}
          cell.appendChild(grid);
        }
        cell.addEventListener('click',()=>onCellClick(r,c));
        boardEl.appendChild(cell);
      }
      updateHighlights();
    }
    function updateCell(r,c){
      const el=boardEl.querySelector(`[data-row="${r}"][data-col="${c}"]`);
      if(!el)return;
      el.textContent='';const ng=el.querySelector('.notes-grid');if(ng)ng.remove();
      el.classList.remove('preset','player-input','has-value','error');
      if(initial[r][c])el.classList.add('preset');
      else if(board[r][c]!==0){el.classList.add('player-input','has-value');if(board[r][c]!==solution[r][c])el.classList.add('error');}
      if(board[r][c]!==0){el.textContent=board[r][c];el.classList.add('has-value');}
      else if(notes[r][c]&&notes[r][c].size){
        const grid=document.createElement('div');grid.className='notes-grid';
        for(let n=1;n<=9;n++){const sp=document.createElement('span');sp.textContent=notes[r][c].has(n)?n:'';grid.appendChild(sp);}
        el.appendChild(grid);
      }
    }
    function updateHighlights(){
      document.querySelectorAll('.cell').forEach(cell=>cell.classList.remove('highlight-related','highlight-box','selected-cell','same-number-highlight'));
      if(selectedRow<0||selectedCol<0)return;
      const selNum=board[selectedRow][selectedCol];
      const br=Math.floor(selectedRow/BOX)*BOX,bc=Math.floor(selectedCol/BOX)*BOX;
      document.querySelectorAll('.cell').forEach(cell=>{
        const r=+cell.dataset.row,c=+cell.dataset.col;
        if(r===selectedRow&&c===selectedCol)cell.classList.add('selected-cell');
        else if(r===selectedRow||c===selectedCol)cell.classList.add('highlight-related');
        else if(Math.floor(r/BOX)*BOX===br&&Math.floor(c/BOX)*BOX===bc)cell.classList.add('highlight-related');
        if(selNum!==0&&board[r][c]===selNum&&!(r===selectedRow&&c===selectedCol))cell.classList.add('same-number-highlight');
      });
    }
    function updateNumCounts(){
      document.querySelectorAll('.num-btn').forEach(btn=>{
        const num=+btn.dataset.num;
        let filled=0;
        for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(board[r][c]===num)filled++;
        btn.classList.remove('count-indicator','full');
        btn.style.opacity='1';
        if(filled>=9){btn.classList.add('count-indicator','full');btn.dataset.count='✓';btn.style.opacity='0.5';}
        else if((9-filled)<=3){btn.classList.add('count-indicator');btn.dataset.count=9-filled;}
        else btn.removeAttribute('data-count');
      });
    }
    function updateNoteBtn(){btnNotes.textContent=noteMode?'✏️ 笔记:开':'✏️ 笔记';btnNotes.classList.toggle('active-toggle',noteMode);}
    function onCellClick(r,c){if(gameComplete)return;selectedRow=r;selectedCol=c;updateHighlights();sfxClick();}
    function setValue(r,c,val){
      if(gameComplete||initial[r][c])return;
      const prevVal=board[r][c],prevNote=cloneNoteCell(notes[r][c]);
      if(prevVal===val&&!notes[r][c])return;
      history.push({r,c,prevVal,prevNote});
      if(history.length>200)history.shift();
      board[r][c]=val;notes[r][c]=null;
      const isCorrect=(val===0||val===solution[r][c]);
      if(!isCorrect&&val!==0){mistakes++;updateMistakes();sfxError();}
      else if(val!==0)sfxPlace();
      else sfxErase();
      updateCell(r,c);updateHighlights();updateNumCounts();
      startIfNeeded();
      checkCompletion();
      if(mistakes>=maxMistakes)handleGameOver();
    }
    function toggleNote(r,c,num){
      if(gameComplete||initial[r][c]||board[r][c]!==0)return;
      const prevVal=board[r][c],prevNote=cloneNoteCell(notes[r][c]);
      if(!notes[r][c])notes[r][c]=new Set();
      const changed=notes[r][c].has(num)?(notes[r][c].delete(num),true):(notes[r][c].add(num),true);
      if(notes[r][c].size===0)notes[r][c]=null;
      if(!changed)return;
      history.push({r,c,prevVal,prevNote});
      if(history.length>200)history.shift();
      updateCell(r,c);updateHighlights();
      sfxNoteToggle();
      startIfNeeded();
    }
    function eraseCell(r,c){
      if(gameComplete||initial[r][c]||(board[r][c]===0&&!notes[r][c]))return;
      const prevVal=board[r][c],prevNote=cloneNoteCell(notes[r][c]);
      history.push({r,c,prevVal,prevNote});
      board[r][c]=0;notes[r][c]=null;
      updateCell(r,c);updateHighlights();updateNumCounts();
      sfxErase();
    }
    function undo(){
      if(gameComplete||history.length===0)return;
      const act=history.pop();
      board[act.r][act.c]=act.prevVal;notes[act.r][act.c]=act.prevNote;
      updateCell(act.r,act.c);updateHighlights();updateNumCounts();
      sfxUndo();
    }
    function hint(){
      if(gameComplete)return;
      const opts=[];
      for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(!initial[r][c]&&board[r][c]!==solution[r][c])opts.push({r,c,prio:board[r][c]===0?1:2});
      if(!opts.length)return;
      opts.sort((a,b)=>a.prio-b.prio);
      const best=opts.filter(o=>o.prio===opts[0].prio);
      const {r,c}=best[Math.floor(Math.random()*best.length)];
      history.push({r,c,prevVal:board[r][c],prevNote:cloneNoteCell(notes[r][c])});
      board[r][c]=solution[r][c];notes[r][c]=null;
      updateCell(r,c);updateHighlights();updateNumCounts();
      selectedRow=r;selectedCol=c;updateHighlights();
      sfxHint();
      startIfNeeded();
      checkCompletion();
    }
    function checkCompletion(){
      for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(board[r][c]!==solution[r][c])return;
      gameComplete=true;stopTimer();sfxWin();
      resultTimeEl.textContent=formatTime(timerSec);
      resultMistakesEl.textContent=mistakes;
      resultDiffEl.textContent=diffConfig[difficulty].label;
      modalIcon.textContent=mistakes===0?'🏆':'🎉';
      modalTitle.textContent=mistakes===0?'完美通关！':'恭喜完成！';
      overlayEl.style.display='flex';
    }
    function handleGameOver(){
      gameComplete=true;stopTimer();
      for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(!initial[r][c])board[r][c]=solution[r][c];
      renderBoard();updateNumCounts();
      sfxGameOver();
      setTimeout(()=>{
        resultTimeEl.textContent=formatTime(timerSec);resultMistakesEl.textContent=mistakes;
        resultDiffEl.textContent=diffConfig[difficulty].label;
        modalIcon.textContent='😞';modalTitle.textContent='错误过多，游戏结束';
        overlayEl.style.display='flex';
      },400);
    }
    function formatTime(s){const m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
    btnErase.onclick=()=>{if(selectedRow>=0&&selectedCol>=0)eraseCell(selectedRow,selectedCol);};
    btnUndo.onclick=undo;
    btnNotes.onclick=()=>{noteMode=!noteMode;updateNoteBtn();sfxClick();};
    btnHint.onclick=hint;
    btnNewGame.onclick=()=>{initGame();sfxClick();};
    btnPlayAgain.onclick=()=>{initGame();sfxClick();};
    document.addEventListener('click',e=>{
      const btn=e.target.closest('.num-btn');
      if(!btn||gameComplete)return;
      const num=+btn.dataset.num;
      if(selectedRow<0||selectedCol<0||initial[selectedRow][selectedCol])return;
      if(noteMode)toggleNote(selectedRow,selectedCol,num);
      else{
        if(board[selectedRow][selectedCol]===num)eraseCell(selectedRow,selectedCol);
        else setValue(selectedRow,selectedCol,num);
      }
    });
    difficultySelector.addEventListener('click',e=>{
      const btn=e.target.closest('.diff-btn');if(!btn)return;
      const diff=btn.dataset.diff;if(diff===difficulty)return;
      difficulty=diff;
      difficultySelector.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      initGame();
      sfxClick();
    });
    document.addEventListener('keydown',e=>{
      if(gameComplete)return;
      if(e.target.tagName==='BUTTON')return;
      const key=e.key;
      if(key>='1'&&key<='9'){
        e.preventDefault();const num=+key;
        if(selectedRow>=0&&selectedCol>=0&&!initial[selectedRow][selectedCol]){
          if(noteMode)toggleNote(selectedRow,selectedCol,num);
          else{
            if(board[selectedRow][selectedCol]===num)eraseCell(selectedRow,selectedCol);
            else setValue(selectedRow,selectedCol,num);
          }
        }
      }else if(key==='Delete'||key==='Backspace'){
        e.preventDefault();if(selectedRow>=0)eraseCell(selectedRow,selectedCol);
      }else if((e.ctrlKey||e.metaKey)&&key==='z'){e.preventDefault();undo();}
      else if(key==='n'||key==='N'){e.preventDefault();noteMode=!noteMode;updateNoteBtn();sfxClick();}
      else if(key==='h'||key==='H'){e.preventDefault();hint();}
      else if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(key)){
        e.preventDefault();
        if(selectedRow<0){selectedRow=4;selectedCol=4;}
        else{
          if(key==='ArrowUp')selectedRow=Math.max(0,selectedRow-1);
          if(key==='ArrowDown')selectedRow=Math.min(8,selectedRow+1);
          if(key==='ArrowLeft')selectedCol=Math.max(0,selectedCol-1);
          if(key==='ArrowRight')selectedCol=Math.min(8,selectedCol+1);
        }
        updateHighlights();sfxClick();
      }else if(key==='Escape'){selectedRow=-1;selectedCol=-1;updateHighlights();}
    });
    document.addEventListener('click',initAudio,{once:true});
    document.addEventListener('keydown',initAudio,{once:true});
    (function start(){
      difficultySelector.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===difficulty));
      updateNoteBtn();
      initGame();
    })();
  })();
</script>
</body>
</html>
