<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>216 Web 安全色表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background-color: #f4f4f4; padding: 15px; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 头部优化：减小内边距和标题大小 */
        header { 
            text-align: center; 
            margin-bottom: 15px; 
            padding: 12px; 
            background: #fff; 
            border-radius: 8px; 
        }
        header h1 { 
            font-size: 1.4em; /* 原来是 2em 左右，现在缩小 */
            margin-bottom: 5px; 
            color: #333;
        }
        header p { 
            color: #666; 
            font-size: 1.2em; /* 描述文字也相应缩小 */
        }

        /* 网格布局 */
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        
        /* 色块优化：稍微减小内边距 */
        .color-card { aspect-ratio: 1 / 1; border-radius: 6px; cursor: pointer; transition: transform 0.2s; display: flex; flex-direction: column; justify-content: flex-end; padding: 4px; }
        .color-card:hover { transform: scale(1.08); }
        
        /* 代码文字优化：更小更紧凑 */
        .color-code { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 2px 4px; 
            border-radius: 3px; 
            font-family: monospace; 
            font-weight: bold; 
            text-align: center; 
            font-size: 1.0em; /* 缩小色号字体 */
            color: #333; 
        }
        .dark-text .color-code { background: rgba(0, 0, 0, 0.7); color: #fff; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.85); color: #fff; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: opacity .3s; z-index: 1000; font-size: 0.9em; }
        .toast.show { opacity: 1; }

        /* 响应式：手机端显示更少列数，避免字挤在一起 */
        @media (max-width: 900px) { .color-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { .color-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎨 216 Web 安全色表</h1>
        <p>点击任意色块复制 HEX 代码</p>
    </header>
    <div class="color-grid" id="colorGrid"></div>
</div>

<div class="toast" id="toast">✅ 已复制!</div>

<script>
    const colorGrid = document.getElementById('colorGrid');
    const values = ['00', '33', '66', '99', 'CC', 'FF'];

    values.forEach(r => {
        values.forEach(g => {
            values.forEach(b => {
                const hex = `#${r}${g}${b}`;
                const isDark = r <= '66' && g <= '66' && b <= '66';
                const card = document.createElement('div');
                card.className = `color-card ${isDark ? 'dark-text' : ''}`;
                card.style.backgroundColor = hex;
                card.innerHTML = `<div class="color-code">${hex}</div>`;
                colorGrid.appendChild(card);
            });
        });
    });

    colorGrid.addEventListener('click', function(e) {
        const card = e.target.closest('.color-card');
        if (!card) return;
        const colorCode = card.querySelector('.color-code').innerText;
        const input = document.createElement('input');
        input.value = colorCode;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);

        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
    });
</script>

</body>
</html>
